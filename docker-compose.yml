services:
  postgres:
    image: postgres:16-alpine
    container_name: helpdesk-lite-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: helpdesk
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: helpdesk_lite
    ports:
      - "5432:5432"
    volumes:
      - helpdesk_pgdata:/var/lib/postgresql/data

volumes:
  helpdesk_pgdata:
